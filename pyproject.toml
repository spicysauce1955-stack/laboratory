[project]
name = "laboratory"
version = "0.1.0"
description = "Remote Experiment Runner — reproducible remote jobs with an agent-usable (MCP) interface and live observability."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "numpy<2",          # spec FR-B2: NumPy <2 pin
    "pydantic>=2",      # manifest / structured models (spec §8)
    "typer>=0.12",      # CLI mirror (FR-F2)
    "fastmcp>=2",       # MCP server (FR-F1)
    "mlflow>=2",        # tracking + live metrics (FR-D2)
    "hydra-core>=1.3",  # experiment config (Experiment Contract §7)
]

# Remote provisioning backend — deferred until we wire the skypilot backend (P0-remote).
# Install when needed, e.g.:  uv add "skypilot[vast]"   (vast.ai for the GPU/P1 path)
[project.optional-dependencies]
skypilot = ["skypilot>=0.7"]

[project.scripts]
lab = "lab.cli:app"

[dependency-groups]
dev = [
    "pytest>=8",
    "ruff>=0.6",
    "mypy>=1.11",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lab"]

[tool.ruff]
line-length = 100

[tool.mypy]
strict = true
files = ["src/lab"]
